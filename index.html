<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink: #ffb7c5;
            --rose: #ff85a1;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* Enhanced for mobile depth */
            touch-action: none;
        }

        /* Soft background glow that follows touch */
        #glow {
            position: fixed;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255, 183, 197, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* The Main Mobile Card */
        .container {
            position: relative;
            width: 85vw; /* Adaptive width for phones */
            max-width: 320px;
            height: 70vh; /* Taller aspect ratio for mobile */
            max-height: 500px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out; /* Smoother for finger tracking */
        }

        /* Mobile Cover Layer */
        #cover {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1s ease;
        }

        .heart-btn {
            font-size: 5rem; /* Larger for easy tapping */
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(255, 133, 161, 0.4));
            animation: float 2.5s infinite ease-in-out;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0) scale(1); } 
            50% { transform: translateY(-20px) scale(1.05); } 
        }

        .tap-hint {
            margin-top: 30px;
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: var(--pink);
            opacity: 0.6;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* The Secret Reveal Zone */
        #reveal-zone {
            opacity: 0;
            transform: translateZ(30px);
            transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            text-align: center;
            padding: 25px;
            width: 100%;
            box-sizing: border-box;
        }

        .hii { 
            font-size: 2rem; 
            font-weight: 800; 
            margin-bottom: 20px; 
            display: block;
            background: linear-gradient(to bottom, #fff, var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .note-text { 
            font-size: 1.1rem; 
            line-height: 1.8; 
            color: #e0e0e0; 
            font-weight: 300; 
        }

        .highlight { 
            color: var(--rose); 
            font-weight: 500; 
            text-shadow: 0 0 10px rgba(255, 133, 161, 0.2);
        }

        .reveal-active #reveal-zone { opacity: 1; }

    </style>
</head>
<body>

<div id="glow"></div>

<div class="container" id="main-box">
    <div id="cover">
        <div class="heart-btn" id="trigger" onclick="openSecret()">🤍</div>
        <div class="tap-hint">Tap the heart</div>
    </div>

    <div id="reveal-zone">
        <span class="hii">Hii! ✨</span>
        <div class="note-text">
            tbh, I built this just to say you're the <span class="highlight">cutest</span> friend I have.
            <br><br>
            honestly? you're the <span class="highlight">favorite part</span> of my day. 🌸
            <br><br>
            stay iconic.
        </div>
    </div>
</div>

<script>
    const glow = document.getElementById('glow');
    const mainBox = document.getElementById('main-box');
    const cover = document.getElementById('cover');
    const trigger = document.getElementById('trigger');

    // 1. Mobile Touch/Tilt Interaction
    document.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        
        // Move the ambient glow
        glow.style.left = t.clientX + 'px';
        glow.style.top = t.clientY + 'px';
        
        // Calculate Tilt based on touch position relative to screen center
        const x = (window.innerWidth / 2 - t.clientX) / 25;
        const y = (window.innerHeight / 2 - t.clientY) / 25;
        
        mainBox.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    }, { passive: true });

    // 2. Desktop Mouse fallback (for testing)
    document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
        const x = (window.innerWidth / 2 - e.clientX) / 30;
        const y = (window.innerHeight / 2 - e.clientY) / 30;
        mainBox.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });

    // 3. Reveal Animation Sequence
    function openSecret() {
        // Change heart color
        trigger.innerText = '💗';
        trigger.style.animation = 'none';
        trigger.style.transform = 'scale(1.5)';
        
        // Cinematic dissolve
        cover.style.opacity = '0';
        cover.style.transform = 'scale(1.1) translateZ(50px)';
        mainBox.classList.add('reveal-active');

        // Mobile-friendly heart confetti
        const end = Date.now() + (1 * 1000);
        const colors = ['#ffb7c5', '#ff85a1', '#ffffff'];

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());

        setTimeout(() => {
            cover.style.display = 'none';
        }, 1100);
    }
</script>
</body>
</html>
